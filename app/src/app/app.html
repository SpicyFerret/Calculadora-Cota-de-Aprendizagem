<mat-toolbar class="topo">
  <a href="https://gerar.org.br/projeto/aprendiz-gerar/" target="_blank" rel="noopener" class="link-logo">
    <img class="logo" src="marca/logo-fonte-branca.png" alt="Aprendiz Gerar" />
  </a>
  <span class="titulo">Calculadora de Cota de Aprendizagem</span>
  <span class="espaco"></span>
  <button
    matIconButton
    data-ajuda="tema"
    (click)="tema.alternar()"
    [attr.aria-label]="tema.escuro() ? 'Mudar para tema claro' : 'Mudar para tema escuro'"
  >
    <mat-icon>{{ tema.escuro() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>

<main>
  <app-entrada />
  <app-resultado />
</main>

<footer data-ajuda="rodape">
  @if (cbo.carregada()) {
    <span>
      Base CBO: {{ cbo.totalOcupacoes() }} ocupações · atualizada em {{ cbo.geradoEm() }} ·
      fonte: {{ cbo.fonte() }}
    </span>
  }
</footer>

<app-ajuda />
