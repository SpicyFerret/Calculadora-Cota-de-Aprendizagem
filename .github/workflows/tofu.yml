name: OpenTofu

on:
  push:
    branches: [infra]
    paths:
      - "infra/**"
      - "scraper/**"
      - ".github/workflows/tofu.yml"
  pull_request:
    paths:
      - "infra/**"
      - "scraper/**"
  workflow_dispatch:

permissions:
  id-token: write # OIDC para assumir a role na AWS
  contents: read

jobs:
  tofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_github_pat: ${{ secrets.GH_PAT_CBO_BOT }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'sa-east-1' }}

      - name: tofu init
        run: >
          tofu init -input=false
          -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"
          -backend-config="key=cota-aprendiz/terraform.tfstate"
          -backend-config="region=${{ vars.AWS_REGION || 'sa-east-1' }}"

      - name: tofu plan
        run: tofu plan -input=false -out=plano.tfplan

      - name: tofu apply
        if: github.event_name != 'pull_request'
        run: tofu apply -input=false -auto-approve plano.tfplan
