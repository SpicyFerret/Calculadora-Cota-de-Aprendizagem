name: OpenTofu

# Deploy da infra separado do deploy do app: este workflow só roda na branch
# "infra" — commits do bot do scraper na main não mexem na infraestrutura.
on:
  push:
    branches: [infra]
    paths:
      - "infra/**"
      - "scraper/**"
      - ".github/workflows/tofu.yml"
  pull_request:
    branches: [infra]
    paths:
      - "infra/**"
      - "scraper/**"
  workflow_dispatch:

permissions:
  id-token: write # OIDC para assumir a role na AWS
  contents: read

jobs:
  tofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_github_pat: ${{ secrets.GH_PAT_CBO_BOT }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_dominio_site: ${{ vars.DOMINIO_SITE }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Nome determinístico: org-repo-contaAWS-regiao-tf-state (sem variável de config).
      - name: Garantir bucket do estado
        id: estado
        run: |
          CONTA=$(aws sts get-caller-identity --query Account --output text)
          NOME=$(echo "${{ github.repository }}-${CONTA}-${AWS_REGION}-tf-state" \
            | tr '[:upper:]' '[:lower:]' | sed 's#[/_.]#-#g' | cut -c1-63)
          echo "Bucket do estado: $NOME"
          if ! aws s3api head-bucket --bucket "$NOME" 2>/dev/null; then
            echo "Bucket não existe — criando."
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$NOME"
            else
              aws s3api create-bucket --bucket "$NOME" \
                --create-bucket-configuration "LocationConstraint=$AWS_REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$NOME" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block --bucket "$NOME" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          fi
          echo "bucket=$NOME" >> "$GITHUB_OUTPUT"

      - name: tofu init
        run: >
          tofu init -input=false
          -backend-config="bucket=${{ steps.estado.outputs.bucket }}"
          -backend-config="key=cota-aprendiz/terraform.tfstate"
          -backend-config="region=${{ env.AWS_REGION }}"

      - name: tofu plan
        run: tofu plan -input=false -out=plano.tfplan

      - name: tofu apply
        if: github.event_name != 'pull_request'
        run: tofu apply -input=false -auto-approve plano.tfplan
